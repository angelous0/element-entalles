server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresion (CSS/JS; las imagenes ya van comprimidas)
    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Cache de recursos estaticos
    location /assets/ { expires 7d; add_header Cache-Control "public"; }

    # ----- URLs limpias del sitio publico -----
    # La ficha detecta el entalle desde el ultimo segmento de la ruta.
    location = /catalogo { try_files /catalogo.html =404; }
    location ~ ^/(baggy|oversize|flare|mom|regular|semipitillo|pitillo|skinny)$ {
        try_files /ficha.html =404;
    }

    # ----- Entrada al panel (tiene su propio login: login.html + admin-auth.js) -----
    location = /admin { try_files /login.html =404; }
    location = /login { try_files /login.html =404; }
    location = /panel { try_files /panel.html =404; }

    # ----- Candado extra del servidor sobre el panel (OPCIONAL, recomendado en produccion) -----
    # El login del navegador es a nivel UX (las credenciales viven en admin-auth.js, visibles).
    # Para un candado real ademas del login, descomenta este bloque y crea las credenciales
    # (ver README: "Proteger el panel de verdad"). Necesita /etc/nginx/.htpasswd.
    # location ~ ^/(admin|login|panel|panel\.html|login\.html|admin-fichas\.html|admin-catalogo\.html|admin-auth\.js)$ {
    #     auth_basic "Element Admin";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #     try_files $uri $uri.html /login.html =404;
    # }

    location / { try_files $uri $uri/ =404; }
}
